services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-haudis}
      POSTGRES_USER: ${DB_USER:-haudis}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-haudis}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-haudis} -d ${DB_NAME:-haudis}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

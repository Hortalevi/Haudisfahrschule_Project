name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *' # every 14 minutes
  workflow_dispatch: # allow manual runs for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping frontend
        run: curl -sS -o /dev/null -w "frontend: %{http_code}\n" https://haudis-frontend.onrender.com/

      - name: Ping backend
        run: curl -sS -o /dev/null -w "backend: %{http_code}\n" https://haudis-backend.onrender.com/api/public/site-settings

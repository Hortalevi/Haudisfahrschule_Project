name: Keep Render Alive

on:
  schedule:
    # Every 10 min, offset from :00/:10/... to dodge GitHub's top-of-hour
    # scheduling congestion. Render's free tier sleeps after 15 min idle,
    # and scheduled GitHub Actions runs can be delayed by several minutes,
    # so 14 min left almost no buffer and the service kept sleeping anyway.
    - cron: '4,14,24,34,44,54 * * * *'
  workflow_dispatch: # allow manual runs for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping frontend
        run: curl -sS -o /dev/null -w "frontend: %{http_code}\n" https://haudis-frontend.onrender.com/

      - name: Ping backend
        run: curl -sS -o /dev/null -w "backend: %{http_code}\n" https://haudis-backend.onrender.com/api/public/site-settings

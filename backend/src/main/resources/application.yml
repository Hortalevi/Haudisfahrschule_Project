server:
  # Render (and most PaaS hosts) inject PORT and require the app to bind to it.
  port: ${PORT:${SERVER_PORT:8080}}
  forward-headers-strategy: framework

spring:
  application:
    name: verkehrsschule-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:haudis}
    username: ${DB_USER:haudis}
    password: ${DB_PASSWORD:haudis}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        transport:
          protocol: smtp

app:
  # false for local http dev; must be true once served over https.
  cookie-secure: ${COOKIE_SECURE:false}
  mail:
    # Blank host = EmailService logs and skips instead of sending (safe local
    # default). Set SMTP_HOST/SMTP_USERNAME/SMTP_PASSWORD to send for real.
    from: ${MAIL_FROM:Haudis Verkehrsschule <no-reply@haudis-verkehrsschule.ch>}
  jwt:
    # Must match JWT_SECRET on the Next.js side (src/proxy.ts, server.ts) - same
    # HS256 secret verifies the cookie on both ends.
    secret: ${JWT_SECRET}
    cookie-name: session
    ttl-seconds: ${JWT_TTL_SECONDS:604800}
  cors:
    # Comma-separated list of allowed origins, e.g. https://haudis-verkehrsschule.ch
    allowed-origins: ${FRONTEND_ORIGIN:http://localhost:3000}
  realtime:
    next-internal-url: ${NEXT_INTERNAL_URL:http://localhost:3000}
    shared-secret: ${INTERNAL_REALTIME_SECRET:}

logging:
  level:
    org.springframework.security: INFO
